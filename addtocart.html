<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bootstrap Cart Sidebar</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body class="p-4">

<!-- Cart Button -->
<button class="btn btn-primary" data-bs-toggle="offcanvas" data-bs-target="#cartSidebar">
🛒 View Cart
</button>

<!-- Product Card -->
<div class="card mt-4" style="width: 18rem;">
  <div class="card-body">
    <h5 class="card-title">Product 1</h5>
    <p class="card-text">Price: $10</p>
    <button class="btn btn-success" onclick="addToCart('Product 1', 10)">Add to Cart</button>
  </div>
</div>

<!-- Offcanvas Cart Sidebar -->
<div class="offcanvas offcanvas-end" tabindex="-1" id="cartSidebar">
  <div class="offcanvas-header">
    <h5 class="offcanvas-title">Your Cart</h5>
    <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
  </div>
  <div class="offcanvas-body">
    <ul class="list-group mb-3" id="cartItems"></ul>
    <h6>Total: $<span id="totalPrice">0</span></h6>
    <button class="btn btn-danger mt-3 w-100">Checkout</button>
  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- Cart Script -->
<script>
let total = 0;

function addToCart(name, price) {
  const cartItems = document.getElementById("cartItems");

  const li = document.createElement("li");
  li.className = "list-group-item d-flex justify-content-between";
  li.innerHTML = `<span>${name}</span><span>$${price}</span>`;

  cartItems.appendChild(li);

  total += price;
  document.getElementById("totalPrice").innerText = total;
}
</script>

</body>
</html>
